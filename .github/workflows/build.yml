name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Build
        run: ./gradlew assemble --no-daemon 2>&1 | tail -30

      - name: Run tests
        run: ./gradlew test --no-daemon 2>&1 | tail -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-unsigned
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7